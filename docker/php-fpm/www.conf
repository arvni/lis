[www]
user  = www-data
group = www-data

; Listen on TCP so Nginx (in another container) can reach PHP-FPM
listen = 0.0.0.0:9000

; Process manager
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Pass all host env vars through to PHP
clear_env = no

; Logging
catch_workers_output       = yes
php_flag[display_errors]   = off
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
