name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (PHPUnit)
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: lis_test
          MARIADB_USER: lis
          MARIADB_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_mysql, gd, zip, bcmath, intl, exif
          coverage: none
          ini-values: memory_limit=1G

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Build frontend assets
        # A few Feature tests render Blade/Inertia pages that reference @vite,
        # which needs public/build/manifest.json to exist.
        run: |
          npm ci
          npm run build

      - name: Run test suite
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: lis_test
          DB_USERNAME: lis
          DB_PASSWORD: secret
        # Use phpunit directly with a raised memory limit: the `artisan test`
        # wrapper OOMs at its 128M child default while rendering the full suite.
        run: php -d memory_limit=1G vendor/bin/phpunit

  static-analysis:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_mysql, gd, zip, bcmath, intl, exif
          coverage: none
          ini-values: memory_limit=1G

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate

      - name: Run PHPStan
        run: php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress

  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Ratchet: 0 errors, and warnings capped at the current count so they
      # can't creep back up. Remaining warnings are all react-hooks/
      # exhaustive-deps (behavioral). Lower this number as they're addressed.
      - name: Run ESLint
        run: npm run lint -- --max-warnings 107

  frontend-tests:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:js
